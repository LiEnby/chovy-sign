id: codes.silica.chovysign
runtime: org.freedesktop.Platform
runtime-version: &rt '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
- org.freedesktop.Sdk.Extension.dotnet10
build-options:
  prepend-path: "/usr/lib/sdk/dotnet10/bin"
  append-ld-library-path: "/usr/lib/sdk/dotnet10/lib"
  prepend-pkg-config-path: "/usr/lib/sdk/dotnet10/lib/pkgconfig"
command: "ChovySign v2"
finish-args:
  # Super display sisters
- --share=ipc
- --socket=x11
  # Needed for downloading game covers
- --share=network
  # Needed to allow for cue files to find their bin
- --filesystem=home
  # needed for atractool
- --allow=multiarch

add-extensions:
  org.freedesktop.Platform.Compat.i386:
    directory: lib/i386-linux-gnu
    version: *rt

cleanup:
  - '*.a'
  - '*.h'
  - '*.la'
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man

modules:
- name: Chovy-Sign-GUI
  sources:
  - type: git
    path: ..
    branch: master
# TODO: please use this when uploading to flathub x3
#    url: &url https://git.silica.codes/Li/chovy-sign
#    commit: &commit af60345c8bf01cdf6c872ec4eeff27a1dfd4cd5f
  - nuget-sources.json
  buildsystem: simple
  build-commands:
  - dotnet publish -p:PublishProfile=Linux64 -c Release --source ./nuget-sources ChovySign-GUI/ChovySign-GUI.csproj --self-contained true --source /usr/lib/sdk/dotnet10/nuget/packages
  - mkdir -p /app/bin
  - cp -r build/publish/ChovySign-GUI/linux* /app/bin/
- name: metadata
  sources:
  - type: git
    path: ..
    branch: master
# TODO: same here
#    url: *url
#    commit: *commit
  buildsystem: simple
  build-commands:
  - ln -s "/app/bin/ChovySign v2" /app/bin/ChovySignGUI || exit
  - ln -s /app/bin/tools/libatrac.so.1 /app/lib/
  - install -Dm644 Flatpak-data/codes.silica.chovysign.metainfo.xml -t /app/share/metainfo/
  - install -Dm644 Flatpak-data/codes.silica.chovysign.releases.xml -t /app/share/metainfo/releases/
  - install -Dm644 Flatpak-data/codes.silica.chovysign.png -t /app/share/icons/hicolor/128x128/apps
  - install -Dm644 Flatpak-data/codes.silica.chovysign.desktop -t /app/share/applications

- name: platform-bootstrap
  buildsystem: simple
  build-commands:
  - |
    set -e
    mkdir -p /app/bin
    mkdir -p /app/lib/i386-linux-gnu
    cp /usr/bin/addr2line /app/bin/
    cp /usr/lib/x86_64-linux-gnu/libbfd-*.so /app/lib/
    install -Dm644 -t /app/etc ld.so.conf
    mkdir -p /app/links/lib
    ln -srv /app/lib /app/links/lib/x86_64-linux-gnu
    ln -srv /app/lib32 /app/links/lib/i386-linux-gnu
  sources:
  - type: file
    path: ld.so.conf
